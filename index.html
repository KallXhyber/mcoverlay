<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root {
            --mc-bg: rgba(0, 0, 0, 0.7);
            --mc-border: #373737;
            --mc-green: #55FF55;
            --mc-yellow: #FFFF55;
        }
        body {
            font-family: 'Press Start 2P', cursive;
            background: transparent;
            margin: 0; padding: 20px; color: white;
            overflow: hidden;
        }
        .overlay-card {
            display: flex;
            align-items: flex-start;
            background: var(--mc-bg);
            border: 4px solid var(--mc-border);
            padding: 15px; width: 330px;
            box-shadow: 5px 5px 0px rgba(0,0,0,0.4);
        }
        .mascot-box {
            width: 60px; height: 60px; margin-right: 15px;
            border: 3px solid #FFF; background: #222; flex-shrink: 0;
        }
        .mascot-box img { width: 100%; image-rendering: pixelated; }
        .info { flex-grow: 1; }
        .server-title { font-size: 10px; color: var(--mc-yellow); margin-bottom: 5px; text-shadow: 2px 2px #000; }
        .slots { font-size: 14px; color: var(--mc-green); margin-bottom: 10px; }
        #player-list { font-size: 9px; list-style: none; padding: 0; margin: 0; }
        .player-item { margin-bottom: 4px; color: #FFF; text-shadow: 1px 1px #000; }
    </style>
</head>
<body>

    <div class="overlay-card">
        <div class="mascot-box">
            <img src="https://mc-heads.net/avatar/Steve" id="mascot">
        </div>
        <div class="info">
            <div class="server-title">JUMBODE SURVIVAL</div>
            <div class="slots" id="slot-count">0 / 0</div>
            <ul id="player-list"></ul>
        </div>
    </div>

    <script>
        const serverIP = 'jumbode.mcsh.io';
        let lastPlayerList = [];
        const joinSound = new Audio('https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3');

        function speak(text) {
            const uttr = new SpeechSynthesisUtterance(text);
            uttr.lang = 'id-ID';
            window.speechSynthesis.speak(uttr);
        }

        async function updateStatus() {
            try {
                const response = await fetch(`https://api.mcsrvstat.us/2/${serverIP}`);
                const data = await response.json();

                if (data.online) {
                    document.getElementById('slot-count').innerText = `${data.players.online} / ${data.players.max}`;
                    const currentPlayerList = data.players.list || [];
                    
                    if (lastPlayerList.length > 0) {
                        currentPlayerList.forEach(player => {
                            if (!lastPlayerList.includes(player)) {
                                joinSound.play().catch(e => console.log("Autoplay blocked, but TikTok Studio usually allows this"));
                                setTimeout(() => {
                                    speak(`Ada yang join nih, welcome ${player}`);
                                }, 1000);
                            }
                        });
                    }

                    const listElement = document.getElementById('player-list');
                    listElement.innerHTML = '';
                    currentPlayerList.slice(0, 5).forEach(name => {
                        const li = document.createElement('li');
                        li.className = 'player-item';
                        li.innerText = `> ${name}`;
                        listElement.appendChild(li);
                    });
                    lastPlayerList = currentPlayerList;
                }
            } catch (err) { console.log("Fetch error"); }
        }

        setInterval(updateStatus, 15000);
        updateStatus();
    </script>
</body>
</html>
